<!DOCTYPE html>
<html lang="id">
<head>
    <title>SKI - TO PSKA 2026</title>
    <link rel="icon" type="image/x-icon" href="almanar.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Menghilangkan scrollbar pada body agar tidak double */
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; 
        }

        /* Navigasi atas */
        .sidenav {
            height: 50px;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        #waktu { color: white; text-decoration: none; font-weight: bold; }

        /* Container Utama harus memenuhi sisa layar */
        .content {
            display: flex;
            height: calc(100vh - 50px); /* Total tinggi layar dikurangi tinggi nav */
            width: 100%;
        }

        .cell {
            height: 100%;
            overflow-y: auto; /* Scroll hanya di dalam panel ini */
            padding: 15px;
            background-color: #fff;
        }

        /* Style untuk pemisah layar (Gutter) */
        .gutter {
            background-color: #eee;
            background-repeat: no-repeat;
            background-position: center;
            cursor: col-resize;
        }

        .responsive {
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>
    <div class="sidenav">
        <a href="#" id="waktu">SISA WAKTU: <span id="timer"></span></a>
    </div>

    <div class="content">
        <div id="left-panel" class="cell">
            <img src="0001 (1).jpg" alt="Soal 1" class="responsive">
            <img src="0001 (2).jpg" alt="Soal 2" class="responsive">
            <img src="0001 (3).jpg" alt="Soal 3" class="responsive">
            <img src="0001 (4).jpg" alt="Soal 4" class="responsive">
            <img src="0001 (5).jpg" alt="Soal 5" class="responsive">
            <img src="0001 (6).jpg" alt="Soal 6" class="responsive">
        </div>

        <div id="right-panel" class="cell">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdLLUGKaqLVVu7eP09G2a66Pe0JLQesfro3OyPJ7hB613joVw/viewform?embedded=true" 
                    style="width:100%; height:100%; border:0;" frameborder="0">Memuat…</iframe>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/split.js/dist/split.min.js"></script>

    <script>
        // 1. TIMER LOGIC
        var sec = 5400; // 90 menit
        var timerDisplay = document.getElementById("timer");
        var hasWarned = false;

        var countDown = setInterval(function () {
            var min = Math.floor(sec / 60);
            var remSec = sec % 60;
            timerDisplay.innerHTML = min + "m : " + (remSec < 10 ? "0" : "") + remSec + "s";

            // Alert 10 menit lagi
            if (sec === 600 && !hasWarned) {
                alert("Waktu mengerjakan tinggal 10 menit lagi! Segera selesaikan jawaban Anda.");
                hasWarned = true;
            }

            if (sec > 0) {
                sec--;
            } else {
                clearInterval(countDown);
                alert("Waktu habis!");
            }
        }, 1000);

        // 2. SPLIT SCREEN (Kiri & Kanan)
        Split(['#left-panel', '#right-panel'], {
            sizes: [50, 50],
            minSize: 300,
            gutterSize: 10,
        });

        // 3. CEGAH REFRESH TIDAK SENGAJA
        $(window).on('beforeunload', function(){
            return "Progress Anda mungkin tidak tersimpan.";
        });
    </script>
</body>
</html>
